<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pokémon Go Открытки</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <datalist id="countriesList"></datalist>
    <datalist id="regionsList"></datalist>
    <datalist id="citiesList"></datalist>

    <div class="top-bar">
        <div class="top-bar-main">
            <button id="btnLogin" class="btn-primary guest-only">
                <span class="pc-text">Авторизация</span>
                <span class="mobile-text">Вход</span>
            </button>

            <button id="btnOpenAddModal" class="btn-primary admin-only">
                <span class="pc-text">Добавить открытку</span>
                <span class="mobile-text">+</span>
            </button>
            
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Поиск" autocomplete="off">
            </div>

            <select id="directionSelectPC" class="pc-only-inline select-direction">
                <option value="from_me">Я</option>
                <option value="to_me">Мне</option>
            </select>
        </div>
        
        <button id="btnOpenFilters" class="mobile-only btn-filter-trigger">↕️</button>
        
        <div id="controlsRight" class="controls-right">
            <div class="mobile-only modal-header">
                <h2>Сортировка</h2>
                <button id="btnCloseFilters" class="btn-close">&times;</button>
            </div>
            
            <select id="sortSelect">
                <option value="dateDesc">По дате (новые сверху)</option>
                <option value="dateAsc">По дате (старые сверху)</option>
                <option value="alphaAsc">По алфавиту (А-Я)</option>
                <option value="alphaDesc">По алфавиту (Я-А)</option>
                <option value="country">Группировка: Страна</option>
                <option value="region">Группировка: Регион</option>
                <option value="city">Группировка: Город</option>
            </select>

            <select id="filterStatus">
                <option value="all">Все открытки</option>
                <option value="completed">У всех</option>
                <option value="missing">Не у всех</option>
            </select>

            <select id="filterCountry"><option value="all">Все страны</option></select>
            <select id="filterRegion"><option value="all">Все регионы</option></select>
            <select id="filterCity"><option value="all">Все города</option></select>
            
            <button id="btnResetPC" class="pc-only-inline btn-reset-clear">Сбросить</button>
            
            <button id="btnLogoutPC" class="btn-logout pc-only-inline admin-only btn-logout-trigger" title="Выйти из режима редактирования">🚪</button>
            
            <div class="mobile-only mobile-direction-block">
                <label>Тип открыток:</label>
                <select id="directionSelectMobile" class="select-direction">
                    <option value="from_me">Я</option>
                    <option value="to_me">Мне</option>
                </select>
                <button id="btnApplyFilters" class="btn-submit" style="margin-top:15px;">Применить</button>
                <button id="btnResetMobile" class="btn-cancel" style="margin-top:10px;">Сбросить</button>
                
                <button id="btnLogoutMobile" class="btn-logout-mobile admin-only btn-logout-trigger">Выйти из аккаунта</button>
            </div>
        </div>
    </div>

    <main>
        <div id="filterCounter" class="filter-counter hidden"></div>
        <div id="galleryGrid" class="gallery-grid"></div>
    </main>

    <button id="btnScrollTop" class="btn-scroll-top hidden"></button>

    <div id="addModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Новая открытка</h2>
                <button id="btnCloseAddModal" class="btn-close">&times;</button>
            </div>
            <form id="uploadForm">
                <label>Название покестопа (обязательно):</label>
                <input type="text" id="stopName" required autocomplete="off">

                <label>Тип открытки:</label>
                <select id="stopDirection" style="width: 100%; margin-bottom: 5px;">
                    <option value="from_me">Я (Подарил)</option>
                    <option value="to_me">Мне (Получил)</option>
                </select>

                <label>Дата открытки (8 цифр ДДММГГГГ или календарь):</label>
                <div class="date-input-group" style="margin-bottom:15px;">
                    <input type="text" id="stopDateText" placeholder="Например: 19052026" maxlength="8" autocomplete="off">
                    <div class="calendar-wrapper">
                        <button type="button" class="calendar-btn" id="btnDateNative" title="Выбрать через календарь">📅</button>
                        <input type="date" id="stopDateNative" class="native-date-input">
                    </div>
                </div>

                <div class="form-row">
                    <div>
                        <label>Страна:</label>
                        <div class="custom-combobox" id="comboCountryAdd">
                            <input type="text" id="stopCountry" autocomplete="off">
                            <span class="combobox-arrow">▼</span>
                            <div class="combobox-dropdown hidden"></div>
                        </div>
                    </div>
                    <div>
                        <label>Город:</label>
                        <div class="custom-combobox" id="comboCityAdd">
                            <input type="text" id="stopCity" autocomplete="off">
                            <span class="combobox-arrow">▼</span>
                            <div class="combobox-dropdown hidden"></div>
                        </div>
                    </div>
                </div>
                
                <label>Регион:</label>
                <div class="custom-combobox" id="comboRegionAdd" style="margin-bottom:15px;">
                    <input type="text" id="stopRegion" autocomplete="off">
                    <span class="combobox-arrow">▼</span>
                    <div class="combobox-dropdown hidden"></div>
                </div>

                <label>Скриншот (обрежется автоматически):</label>
                <input type="file" id="imageInput" accept="image/*">

                <div id="addRecipientsGroup" class="checkbox-group">
                    <label><input type="checkbox" id="chkAlbum"> Альбом</label>
                    <label><input type="checkbox" id="chkFriend1"> Tupra</label>
                    <label><input type="checkbox" id="chkFriend2"> zxcCUMKILLER228pro</label>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit" style="margin-top: 15px;">Сохранить открытку</button>
                <div id="loadingIndicator" class="hidden" style="text-align: center; margin-top: 10px;">Обработка и сохранение...</div>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
