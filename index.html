<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pokémon Go Открытки</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-bar">
        <div class="top-bar-main">
            <button id="btnLogin" class="btn-primary guest-only">
                <span class="pc-text">Авторизация</span>
                <span class="mobile-text">Вход</span>
            </button>

            <button id="btnOpenAddModal" class="btn-primary admin-only pc-only-inline">
                Добавить открытку
            </button>
            
            <button id="btnOpenAddModalMobile" class="mobile-btn admin-only mobile-only">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
            
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Поиск" autocomplete="off">
                <button id="clearSearchBtn" class="clear-search hidden">&times;</button>
            </div>

            <button id="btnOpenFilters" class="mobile-btn mobile-only">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </div>
        
        <div id="controlsRight" class="controls-right">
            <div class="mobile-only modal-header">
                <h2>Сортировка</h2>
                <button id="btnCloseFilters" class="btn-close">&times;</button>
            </div>
            
            <select id="sortSelect">
                <option value="dateDesc">По дате добавления (новые сверху)</option>
                <option value="dateAsc">По дате добавления (старые сверху)</option>
                <option value="alphaAsc">По алфавиту (А-Я)</option>
                <option value="alphaDesc">По алфавиту (Я-А)</option>
                <option value="country">Группировка: Страна</option>
                <option value="region">Группировка: Регион</option>
                <option value="city">Группировка: Город</option>
            </select>

            <select id="filterCountry"><option value="all">Все страны</option></select>
            <select id="filterRegion"><option value="all">Все регионы</option></select>
            <select id="filterCity"><option value="all">Все города</option></select>
            
            <button id="btnResetPC" class="pc-only-inline btn-reset-clear">Сбросить</button>
            <button id="btnLogoutPC" class="btn-logout pc-only-inline admin-only btn-logout-trigger" title="Выйти из режима редактирования">🚪</button>
            
            <div class="mobile-only mobile-direction-block">
                <button id="btnApplyFilters" class="btn-submit" style="margin-top:15px;">Применить</button>
                <button id="btnResetMobile" class="btn-cancel" style="margin-top:10px;">Сбросить</button>
                <button id="btnLogoutMobile" class="btn-logout-mobile admin-only btn-logout-trigger">Выйти из аккаунта</button>
            </div>
        </div>
    </div>

    <main>
        <div id="filterCounter" class="filter-counter hidden"></div>
        <div id="galleryGrid" class="gallery-grid"></div>
    </main>

    <button id="btnScrollTop" class="btn-scroll-top hidden"></button>

    <div id="addModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Новая открытка</h2>
                <button id="btnCloseAddModal" class="btn-close">&times;</button>
            </div>
            <form id="uploadForm">
                
                <label>Скриншот:</label>
                
                <div id="dropZone" class="drop-zone">
                    <span id="dropZoneText">Нажмите или перетащите скриншот сюда</span>
                    <input type="file" id="imageInput" accept="image/*" class="file-input-hidden">
                </div>
                
                <div id="ocrStatus" class="hidden" style="margin-top: 5px; font-weight: 600; font-size: 0.9rem;"></div>
                
                <div id="ocrLimitWarning" class="warning-text hidden">Лимит авто-распознавания текста на сегодня исчерпан. Поля нужно заполнить вручную.</div>
                
                <label>Название покестопа (обязательно):</label>
                <input type="text" id="stopName" class="track-input" required autocomplete="off">
                
                <div id="duplicateWarning" class="warning-box hidden">
                    Такая открытка уже есть! <a href="#" id="viewDuplicateLink">Посмотреть её</a>
                </div>

                <div class="form-row">
                    <div>
                        <label>Страна:</label>
                        <div class="custom-combobox" id="comboCountryAdd">
                            <input type="text" id="stopCountry" class="track-input" autocomplete="off">
                            <span class="combobox-arrow">▼</span>
                            <div class="combobox-dropdown hidden"></div>
                        </div>
                    </div>
                    <div>
                        <label>Город:</label>
                        <div class="custom-combobox" id="comboCityAdd">
                            <input type="text" id="stopCity" class="track-input" autocomplete="off">
                            <span class="combobox-arrow">▼</span>
                            <div class="combobox-dropdown hidden"></div>
                        </div>
                    </div>
                </div>
                
                <label>Регион:</label>
                <div class="custom-combobox" id="comboRegionAdd" style="margin-bottom:15px;">
                    <input type="text" id="stopRegion" class="track-input" autocomplete="off">
                    <span class="combobox-arrow">▼</span>
                    <div class="combobox-dropdown hidden"></div>
                </div>

                <label>Наличие у пользователей:</label>
                <div id="addRecipientsGroup" class="checkbox-group">
                    <label><input type="checkbox" id="chkSanjame"> Sanjame</label>
                    <label><input type="checkbox" id="chkFriend1"> Tupra</label>
                    <label><input type="checkbox" id="chkFriend2"> zxcCUMKILLER228pro</label>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit" style="margin-top: 15px;">Сохранить открытку</button>
                <div id="loadingIndicator" class="hidden" style="text-align: center; margin-top: 10px; color: var(--text-muted);">Обработка и сохранение...</div>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
