<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>База Открыток</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <datalist id="countriesList"></datalist>
    <datalist id="regionsList"></datalist>
    <datalist id="citiesList"></datalist>

    <div class="top-bar">
        <div class="top-bar-main">
            <button id="btnOpenAddModal" class="btn-primary">Добавить открытку</button>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Поиск по названию..." autocomplete="off">
            </div>
        </div>
        
        <div class="controls-right">
            <select id="sortSelect">
                <option value="dateDesc">По дате (новые сверху)</option>
                <option value="dateAsc">По дате (старые сверху)</option>
                <option value="alphaAsc">По алфавиту (А-Я)</option>
                <option value="alphaDesc">По алфавиту (Я-А)</option>
                <option value="country">Группировка: Страна</option>
                <option value="region">Группировка: Регион</option>
                <option value="city">Группировка: Город</option>
            </select>

            <select id="filterStatus">
                <option value="all">Все открытки</option>
                <option value="completed">У всех</option>
                <option value="missing">Не у всех</option>
            </select>

            <select id="filterCountry"><option value="all">Все страны</option></select>
            <select id="filterRegion"><option value="all">Все регионы</option></select>
            <select id="filterCity"><option value="all">Все города</option></select>
        </div>
    </div>

    <main>
        <div id="galleryGrid" class="gallery-grid"></div>
    </main>

    <div id="addModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Новая открытка</h2>
                <button id="btnCloseAddModal" class="btn-close">&times;</button>
            </div>
            <form id="uploadForm">
                <label>Название покестопа (обязательно):</label>
                <input type="text" id="stopName" required autocomplete="off">

                <label>Дата открытки (текстом ДД.ММ.ГГГГ или через календарь):</label>
                <div class="date-input-group">
                    <input type="text" id="stopDateText" placeholder="Например: 19.05.2026 или 19052026" autocomplete="off">
                    <div class="calendar-btn" title="Выбрать через календарь">
                        📅
                        <input type="date" id="stopDateNative">
                    </div>
                </div>

                <div class="form-row">
                    <div>
                        <label>Страна:</label>
                        <input type="text" id="stopCountry" list="countriesList" autocomplete="off">
                    </div>
                    <div>
                        <label>Регион:</label>
                        <input type="text" id="stopRegion" list="regionsList" autocomplete="off">
                    </div>
                    <div>
                        <label>Город:</label>
                        <input type="text" id="stopCity" list="citiesList" autocomplete="off">
                    </div>
                </div>

                <label>Скриншот (обрежется автоматически):</label>
                <input type="file" id="imageInput" accept="image/*">

                <div class="checkbox-group">
                    <label><input type="checkbox" id="chkAlbum"> Альбом</label>
                    <label><input type="checkbox" id="chkFriend1"> Tupra</label>
                    <label><input type="checkbox" id="chkFriend2"> CUMKILLER</label>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit">Сохранить открытку</button>
                <div id="loadingIndicator" class="hidden">Обработка и сохранение...</div>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
